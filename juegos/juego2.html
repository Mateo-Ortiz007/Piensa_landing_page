<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Memoria de Vegetales</title>
    <link rel="stylesheet" href="juego2.css" />
  </head>
  <body>
    <header class="main-nav">
      <div class="main-nav-inner">
        <a class="mn-brand" href="../principal/principal_page.html">
          <img src="../assets/cover.png" alt="Logo Real Forest" />
          <span>Real Forest</span>
        </a>
        <nav class="mn-links">
          <a href="../principal/principal_page.html">Inicio</a>
          <a href="juegos_page.html" class="active">Juegos</a>
          <a href="../info/info.html">Info</a>
        </nav>
      </div>
    </header>
    <div class="game-container">
      <div class="game-header">
        <div class="header-text">
          <h1>🧠 Memoria: Vegetales</h1>
          <p>Encuentra las parejas: une cada vegetal con su nombre antes de que se acabe el reto.</p>
        </div>
        <div class="header-img">
          <img
            src="../assets/captura_proyecto3.PNG"
            alt="Vegetales de Ecuador"
          />
        </div>
      </div>

      <div class="game-box">
        <div class="stats">
          <div class="stat"><span class="stat-label">Movimientos</span><span id="moves">0</span></div>
          <div class="stat"><span class="stat-label">Parejas</span><span id="pairs">0 / 6</span></div>
          <div class="stat"><span class="stat-label">Tiempo</span><span id="timer">0s</span></div>
        </div>

        <div class="board" id="board"></div>

        <div class="win-message" id="winMessage">
          <h2>🎉 ¡Lo lograste!</h2>
          <p id="winText"></p>
        </div>

        <div class="controls">
          <button id="restartBtn" class="btn-primary">🔄 Reiniciar</button>
          <a href="juegos_page.html" class="back-link">← Volver a Juegos</a>
        </div>
      </div>
    </div>

    <script src="juego2.js"></script>
    <script src="game-guard.js"></script>
  </body>
</html>
