<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Quiz Medicinales</title>
    <link rel="stylesheet" href="juego1.css" />
  </head>
  <body>
    <header class="main-nav">
      <div class="main-nav-inner">
        <a class="mn-brand" href="../principal/principal_page.html">
          <img src="../assets/cover.png" alt="Logo Real Forest" />
          <span>Real Forest</span>
        </a>
        <nav class="mn-links">
          <a href="../principal/principal_page.html">Inicio</a>
          <a href="juegos_page.html" class="active">Juegos</a>
          <a href="../info/info.html">Info</a>
        </nav>
      </div>
    </header>
    <div class="quiz-container">
      <div class="quiz-header">
        <div class="header-text">
          <span class="badge">❓ Trivia</span>
          <h1>Quiz: Plantas Medicinales</h1>
          <p>Descubre todo lo que sabes sobre plantas medicinales de Ecuador</p>
        </div>
        <div class="header-img">
          <img src="../assets/captura_proyecto2.PNG" alt="Plantas medicinales" />
        </div>
      </div>

      <div class="quiz-box">
        <div class="progress">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <p class="question-num" id="qnum"></p>
        <div class="question" id="question"></div>
        <div class="answers" id="answers"></div>
        <div class="controls">
          <button id="nextBtn" class="btn-primary">Siguiente →</button>
          <button id="restartBtn" class="btn-secondary">Reiniciar</button>
          <a href="juegos_page.html" class="back-link">← Volver a Juegos</a>
        </div>
        <p id="score" class="score"></p>
      </div>
    </div>
    <script src="juego1.js"></script>
    <script src="game-guard.js"></script>
  </body>
</html>
