<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Clasifica el Bosque</title>
    <link rel="stylesheet" href="juego3.css" />
  </head>
  <body>
    <header class="main-nav">
      <div class="main-nav-inner">
        <a class="mn-brand" href="../index.html">
          <img src="../assets/cover.png" alt="Logo Real Forest" />
          <span>Real Forest</span>
        </a>
        <nav class="mn-links">
          <a href="../index.html">Inicio</a>
          <a href="juegos_page.html" class="active">Juegos</a>
          <a href="../info/info.html">Info</a>
        </nav>
      </div>
    </header>
    <div class="game-container">
      <div class="game-header">
        <div class="header-text">
          <h1>🌳 Clasifica el Bosque</h1>
          <p>Arrastra cada especie a su grupo correcto. ¡Aprende la biodiversidad del bosque jugando!</p>
        </div>
        <div class="header-img">
          <img src="../assets/captura_proyecto4.PNG" alt="Plantas del bosque" />
        </div>
      </div>

      <div class="game-box">
        <div class="stats">
          <div class="stat"><span class="stat-label">Aciertos</span><span id="score">0</span></div>
          <div class="stat"><span class="stat-label">Restantes</span><span id="remaining">0</span></div>
        </div>

        <div class="pool" id="pool"></div>

        <div class="bins" id="bins">
          <div class="bin" data-cat="arbol">
            <div class="bin-title">🌲 Árboles</div>
            <div class="bin-drop" data-cat="arbol"></div>
          </div>
          <div class="bin" data-cat="epifita">
            <div class="bin-title">🌸 Epífitas</div>
            <div class="bin-drop" data-cat="epifita"></div>
          </div>
          <div class="bin" data-cat="otra">
            <div class="bin-title">🌿 Palmerasy trepadoras</div>
            <div class="bin-drop" data-cat="otra"></div>
          </div>
        </div>

        <div class="win-message" id="winMessage">
          <h2>🎉 ¡Bosque clasificado!</h2>
          <p id="winText"></p>
        </div>

        <div class="controls">
          <button id="restartBtn" class="btn-primary">🔄 Reiniciar</button>
          <a href="juegos_page.html" class="back-link">← Volver a Juegos</a>
        </div>
      </div>
    </div>

    <script src="juego3.js"></script>
    <script src="game-guard.js"></script>
  </body>
</html>
